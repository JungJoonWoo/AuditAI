import org.gradle.github.GitHubDependencyGraphPlugin
import java.nio.file.Paths

initscript {

  def repoDir = Paths.get(System.getenv("CODEQL_EXTRACTOR_JAVA_ROOT")).resolve("tools").resolve("depgraph-plugin-maven-repo")

  repositories {
    maven {
      url = uri(repoDir)
    }

    // Make private registries available before the public plugin repo
    def proxyUrls = System.getenv("CODEQL_PROXY_URLS")
    if (proxyUrls && !proxyUrls.isEmpty()) {
      def parsedJson = new groovy.json.JsonSlurper().parseText(proxyUrls)
      parsedJson.each { config ->
        if (config.type == "maven_repository") {
          maven {
            url = uri(config.url)
          }
        }
      }
    }

    maven {
      url = uri("https://plugins.gradle.org/m2/")
    }
  }
  dependencies {
    classpath("org.gradle:github-dependency-graph-gradle-plugin-codeql-fork:1.3.1")
  }
}

apply plugin: GitHubDependencyGraphPlugin
