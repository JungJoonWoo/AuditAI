# 위험 행위 추상 분류 — 엔진 결과를 공통 분류로 정규화 (청사진 §7 Capability)
capabilities:
  - id: command_execution
    name: OS Command Execution
    cwe: CWE-78
    description: 외부 입력이 OS 명령 실행에 도달
    severity_hint: high
    examples: ["subprocess.run(shell=True)", "os.system"]
    terminal_impact: RCE
    meta:
      owner: auditai-seed
      version: "0.1.0"
      test_fixture: eval_targets/synthetic_python/command_injection.py
      expected_tp_fp: "tp>=1,fp=0"
      engine_mappings:
        semgrep: "p/python: command-injection 계열"
        codeql: "sinkModel: command injection"
        prompt_context: "사용자 입력이 셸 명령으로 실행되는지"

  - id: code_execution
    name: Dynamic Code Execution
    cwe: CWE-94
    description: 외부 입력이 eval/exec 등 동적 코드 실행에 도달
    severity_hint: high
    examples: ["eval", "exec"]
    terminal_impact: RCE
    meta:
      owner: auditai-seed
      version: "0.1.0"
      test_fixture: eval_targets/synthetic_python/code_execution.py
      expected_tp_fp: "tp>=1,fp=0"
      engine_mappings:
        codeql: "sinkModel: code injection"
        prompt_context: "사용자 입력이 동적 코드로 실행되는지"

  - id: sql_execution
    name: SQL Execution
    cwe: CWE-89
    description: 동적으로 조립된 외부 입력이 SQL 실행에 도달
    severity_hint: high
    examples: ["cursor.execute(f-string)", "sqlite3.Connection.executescript", "aiosqlite execute"]
    terminal_impact: data exfiltration / tampering
    meta:
      owner: auditai-seed
      version: "0.1.0"
      test_fixture: eval_targets/synthetic_python/sql_injection.py
      expected_tp_fp: "tp>=1,fp=0"
      engine_mappings:
        codeql: "sinkModel: sql injection"
        prompt_context: "parameterized 인지 raw 조립인지"

  - id: path_traversal
    name: Path Traversal
    cwe: CWE-22
    description: 외부 입력이 파일 경로 구성에 도달
    severity_hint: high
    examples: ["open(user_path)"]
    terminal_impact: arbitrary file read/write
    meta:
      owner: auditai-seed
      version: "0.1.0"
      test_fixture: eval_targets/synthetic_python/path_traversal.py
      expected_tp_fp: "tp>=1,fp=0"
      engine_mappings:
        codeql: "sinkModel: path injection"

  - id: ssrf
    name: Server-Side Request Forgery
    cwe: CWE-918
    description: 외부 입력이 서버측 네트워크 요청 URL에 도달
    severity_hint: high
    examples: ["requests.get(user_url)"]
    terminal_impact: internal network access
    meta:
      owner: auditai-seed
      version: "0.1.0"
      test_fixture: eval_targets/synthetic_python/ssrf.py
      expected_tp_fp: "tp>=1,fp=0"
      engine_mappings:
        codeql: "sinkModel: request forgery"

  - id: unsafe_deserialization
    name: Unsafe Deserialization
    cwe: CWE-502
    description: 외부 입력이 안전하지 않은 역직렬화에 도달
    severity_hint: high
    examples: ["pickle.loads", "yaml.load", "ormsgpack.unpackb", "marshal.loads", "dill.loads", "jsonpickle.decode"]
    terminal_impact: RCE
    meta:
      owner: auditai-seed
      version: "0.1.0"
      test_fixture: eval_targets/synthetic_python/unsafe_deserialization.py
      expected_tp_fp: "tp>=1,fp=0"
      engine_mappings:
        codeql: "sinkModel: unsafe deserialization"
