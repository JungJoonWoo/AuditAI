# 언어/라이브러리 API -> capability 연결 (청사진 §7 ApiSignature)
api_signatures:
  - id: python.subprocess.run
    language: python
    module: subprocess
    qualified_name: subprocess.run
    method_name: run
    capability_id: command_execution
    argument_roles: {"0": command, "shell": shell_mode}
    dangerous_conditions:
      - {arg: shell, equals: true}
    confidence: high
    meta:
      owner: auditai-seed
      version: "0.1.0"
      test_fixture: eval_targets/synthetic_python/command_injection.py
      expected_tp_fp: "tp>=1,fp=0"

