  # --- LangGraph PoC chain (Check Point): deserialization -> RCE (CWE-502) ---
  # pickle.loads 는 위 sink.pickle.loads 가 이미 등록. 아래는 동족 P0 sink 보강.
  - id: sink.pickle.load
