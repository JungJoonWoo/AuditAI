  # 임의코드실행이 아니라(raw/custom hook/strict_map_key 조건부) → high-confidence taint 주장 금지.
  # static_pattern_risk 성격으로 confidence=low + FP 허용을 meta(expected_tp_fp)에 정직 표기. 등록은 유지.
  - id: sink.ormsgpack.unpackb
    api_signature_id: python.ormsgpack.unpackb
    sink_kind: deserialization
    dangerous_argument: "0"
    capability_id: unsafe_deserialization
    cwe: CWE-502
    confidence: low  # recall 지향(static_pattern_risk) — 기본 unpackb 는 RCE 아님, FP 허용
    meta:
      owner: auditai-seed
      version: "0.1.0"
      test_fixture: eval_targets/synthetic_python/unsafe_deserialization.py
      expected_tp_fp: "tp>=1,fp<=1  # recall-oriented(high FP); 의미판정은 S3"

